global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend https_front
    bind 0.0.0.0:3001 ssl crt priv/cert/combined.pem
    default_backend app_servers

backend app_servers
    balance roundrobin
    server app1 localhost:4000 check
    server app2 localhost:4001 check
